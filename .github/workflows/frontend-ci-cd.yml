name: Frontend CI/CD

on:
  push:
    branches: [master]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.STAGING_BACKEND_URL }}

      - name: Deploy to staging
        run: |
          curl -X POST ${{ secrets.STAGING_FRONTEND_DEPLOY_WEBHOOK }}

      - name: Wait for staging deployment
        run: |
          echo "Waiting for staging deployment..."
          for i in {1..30}; do
            if curl -f ${{ secrets.STAGING_FRONTEND_URL }}; then
              echo "Staging is ready"
              exit 0
            fi
            echo "Not ready yet... retrying"
            sleep 10
          done
          echo "Staging deployment failed"
          exit 1
  Wait_for_backend_health:
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Staging Health Checks
        run: |
          echo "Waiting for backend..."
          
          for i in {1..30}; do
            STATUS=$(curl -s https://java-spring-boot-hotel-booking-system-5smr.onrender.com/actuator/health | grep UP)
          
            if [ ! -z "$STATUS" ]; then
              echo "Backend is healthy"
              exit 0
            fi
          
            echo "Still starting..."
            sleep 10
          done
          
          echo "Backend failed to become healthy"
          exit 1
  playwright:
    needs: Wait_for_backend_health
    uses: KarimBassel/Hotel-Booking-Frontend/.github/workflows/playwright.yml@master
    secrets: inherit

  deploy-production:
    needs: playwright
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production
        run: |
          curl -X POST ${{ secrets.PROD_FRONTEND_DEPLOY_WEBHOOK }}